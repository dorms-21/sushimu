<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">SUSHIMU</div>
      <div class="user-info">Bienvenido {{.UserName}} | Rol: {{.UserRole}}</div>
    </div>

    <section class="hero">
      <h1>Dashboard</h1>
      <p>Centro de control del restaurante.</p>
      <div class="actions">
        <a href="/productos">Productos</a>
        <a href="/ordenes">Órdenes</a>
        <a href="/ventas">Ventas</a>
        <a href="/admin">Administración</a>
        <a href="/pos">POS</a>
        <a href="/logout">Cerrar sesión</a>
      </div>
    </section>

    <div class="grid grid-3 mt-3">
      <div class="stat-card">
        <h3>Rol actual</h3>
        <div class="number">{{.UserRole}}</div>
      </div>

      <div class="stat-card">
        <h3>Usuario</h3>
        <div class="number">{{.UserName}}</div>
      </div>

      <div class="stat-card">
        <h3>Sistema</h3>
        <div class="number">Activo</div>
      </div>
    </div>
  </div>
</body>
</html>
